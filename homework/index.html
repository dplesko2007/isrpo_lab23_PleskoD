<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль пользователя</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Профиль пользователя</h1>

    <div class="form-block">
      <div class="field">
        <label for="name">Имя</label>
        <input type="text" id="name" placeholder="Введите имя" />
      </div>
      <div class="field">
        <label for="age">Возраст</label>
        <input type="number" id="age" placeholder="Введите возраст" min="1" />
      </div>
      <div class="field">
        <label for="city">Город</label>
        <input type="text" id="city" placeholder="Введите город" />
      </div>
      <div class="field">
        <label for="hobby">Хобби</label>
        <input type="text" id="hobby" placeholder="Введите хобби" />
      </div>

      <p id="error" class="error"></p>

      <div class="buttons">
        <button id="saveBtn">Сохранить</button>
        <button id="clearBtn" class="secondary">Очистить данные</button>
      </div>
    </div>

    <div class="profile-card" id="profileCard">
      <h2>Данные профиля</h2>
      <p><span>Имя:</span> <span id="displayName">—</span></p>
      <p><span>Возраст:</span> <span id="displayAge">—</span></p>
      <p><span>Город:</span> <span id="displayCity">—</span></p>
      <p><span>Хобби:</span> <span id="displayHobby">—</span></p>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
